<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marathi Movies</title>
    <style>
        /* Basic Page Settings */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, orange, white, orange);
            background-size: 400% 400%;
            animation: gradientMove 5s ease infinite;
            font-family: Georgia, 'Times New Roman', Times, serif;
            padding: 20px;
            box-sizing: border-box; 
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- HEADER LAYOUT (Safe & Perfect) --- */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-top: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 25px; 
        }
        .hamburger {
            font-size: 25px;
            cursor: pointer;
            color: darkorange;
            transition:transform 0.3s ease;
            background : white;
            padding: 0px 10px;
            border-radius: 10px;
            box-shadow: 0 0px 5px rgba(0,0,0,0.2);
        }
        .hamburger:hover {
            transform: scale(1.1);
        }
        h1 {
            margin: 0;
            color: black;
            font-size: 22px;
        }
        .corner-photo {
            width: 100px;
            margin-top: -10px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 0px solid #ffffff;
            box-shadow: 0px 8px 8px rgba(0, 0, 0, 0.9);
        }
        /* SIDE MENU CSS */
        .side-menu {
            height: 30vh;
            width: 0; 
            position: absolute;
            z-index: 1002;
            top: 0;
            left: 0;
            background-color: rgba(255, 152, 0, 0.8);
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        .side-menu a {
            padding: 15px 20px 15px 32px;
            text-decoration: none;
            font-size: 22px;
            color: black;
            display: block;
            transition: 0.3s;
            font-weight: bold;
        }
        .side-menu a:hover {
            color: #333;
            background-color: rgba(255, 255, 255, 0.3);
        }
        .side-menu .close-btn {
            position: absolute;
            top: 0;
            right: 15px;
            font-size: 40px;
            margin-left: 50px;
            background: none;
        }
        
        /* --- NEW: CATEGORY BUTTONS CSS --- */
        .category-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
            flex-wrap: wrap;
            /* Agar screen choti ho toh adjust ho jayega */
        }
        .cat-btn {
            background-color: white;
            color: black;
            border: 2px solid #ff9800;
            padding: 8px 25px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .cat-btn:hover {
            background-color: #ff9800;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 10px rgba(255, 152, 0, 0.4);
        }

        /* --- SEARCH BAR CSS --- */
        .search-container {
            width: 100%;
            margin-bottom: 25px;
            text-align: center;
            margin-top: 15px;
        }
        #searchBar {
            width: 80%;
            max-width: 500px;
            padding: 12px 20px;
            border: 3px solid #ff9800;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        #searchBar:focus {
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.5);
            width: 85%;
        }
        /* MAIN GRID */
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        /* CARD FLEX */
        .card {
            padding: 10px;
            border: 3px solid #ff9800;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background-color: white; 
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }
        .card img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 0px 5px;
        }
        .card h3, .card h2 {
            margin: 0 0 10px 0;
            color: #333;
            font-size: 15px;
        }
        .card p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        /* BUTTON */
        .button {
            display: inline-block;
            text-decoration: none;
            background-color: orange; 
            color: white; 
            border: 2px solid #ff9800; 
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            border-radius: 5px; 
            transition: all 0.2s ease; 
            cursor: pointer;
            margin-top: auto; 
        }
        .button:hover {
            background-color: #ff9800; 
            box-shadow: 4px 4px 0px rgba(255, 152, 0, 0.4); 
            transform: translateY(-2px);
        }
        /* Pagination Settings */
        .pagination {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
            grid-column: 1 / -1; 
        }
        .next-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #ff9800;
            color: white;
            padding: 8px 40px; 
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ff9800;
            border-radius: 6px;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.2);
        }
        .next-btn:hover {
            background-color: transparent;
            color: #ff9800;
            transform: translateY(-2px);
        }
    </style>
</head>
<body> 
    <div id="sideMenu" class="side-menu">
        <a href="javascript:void(0)" class="close-btn" onclick="toggleMenu()">&times;</a>
        <a href="Marathi.html">Marathi Movies 🍿</a>

    <div class="main-header">

        </div>

    <h2 style="color: olivedrab; text-align: center; margin: 10px 0; display: flex; justify-content: center; font-family: cursive; font-size: 200%;"><i>Made By Rohan</i></h2>
    <p style="color: green; text-align: center; margin-bottom: 20px; font-size: 80%;">All upcoming MOVIES is here</p>
    <h1 style="text-align: center;font-size: 200%;margin-bottom: 20px;color: lightseagreen;">Marathi Movies</h1>

    <div class="category-buttons">
        <a href="index.html" class="cat-btn">HOME</a>
    </div>

    <div class="search-container">
        <input type="text" id="searchBar" onkeyup="filterMovies()" placeholder="Search Movies, Quality, or Genre...">

    <div class="container" id="movieContainer">
        <div class="card">

        <div class="card">

        </div>

        <div class="card">
            <img src="" alt="Image 2">

        </div>
        
        <div class="card">
            <img src="" alt="Image 2">

        </div>

        <div class="pagination">
            <a href="http://localhost:7700/Next%20page.html" class="next-btn">Next Page &raquo;</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            let menu = document.getElementById("sideMenu");
            if (menu.style.width === "410px") {
                menu.style.width = "0";
            } else {
                menu.style.width = "410px";
            }
        }

        function filterMovies() {
            let input = document.getElementById('searchBar').value.toLowerCase();
            let cards = document.querySelectorAll('.card');

            cards.forEach(card => {
                let cardText = card.innerText.toLowerCase();
                if (cardText.includes(input)) {
                    card.style.display = "flex"; 
                } else {
                    card.style.display = "none"; 
                }
            });
        }
    </script>
</body>
</html>
