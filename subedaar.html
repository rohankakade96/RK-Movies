    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", async () => {
            const apiToken = '5993de467bdc613e017314414aa06255e254e761';
            const excludeDomains = [
                "youtube.com", "m.youtube", "youtu.be", "m.youtube.com", "www.youtube.com", 
                "instagram.com", "www.instagram.com", "telegram.com", "www.telegram.com", "t.me", 
                "www.whatsapp.com", "whatsapp.com", "facebook.com", "m.facebook.com"
            ];

            const links = document.querySelectorAll("a");

            // Har ek link ko process karne ka function
            const processLink = async (link) => {
                let originalUrl = link.href;

                // Blank, javascript, mailto, ya same page link ho toh ignore karo
                if (!originalUrl || originalUrl.startsWith("javascript:") || originalUrl.startsWith("mailto:") || originalUrl === window.location.href) {
                    return;
                }

                try {
                    let urlObj = new URL(originalUrl);
                    let domain = urlObj.hostname.replace('www.', '');

                    // Check karein ki domain exclude list me hai ya apni hi website ka hai
                    if (excludeDomains.includes(domain) || domain === window.location.hostname) {
                        return; 
                    }

                    // --- Yahan se Link Convert hona shuru hoga ---
                    
                    // 1. Button ka purana text save karein
                    let originalHTML = link.innerHTML;
                    
                    // 2. Button par loading spinner lagayein aur click disable karein
                    link.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
                    link.classList.add("btn-loading");

                    // 3. API Call karein
                    let apiUrl = `https://gplinks.com/api?api=${apiToken}&url=${encodeURIComponent(originalUrl)}`;
                    let response = await fetch(apiUrl);
                    let data = await response.json();

                    // 4. Agar success ho jaye toh naya link set karein
                    if (data.status === 'success') {
                        link.href = data.shortenedUrl;
                    }

                    // 5. Button ko wapas normal state me le aayein
                    link.innerHTML = originalHTML;
                    link.classList.remove("btn-loading");

                } catch (error) {
                    console.error("GPLink Error for:", originalUrl, error);
                    // Error aane par bhi button ko wapas normal kar de, taaki user ruk na jaye
                    link.innerHTML = link.innerHTML.replace('<i class="fas fa-spinner fa-spin"></i> Generating...', 'Download');
                    link.classList.remove("btn-loading");
                }
            };

            // Saare links ko ek saath convert karne ke liye (fast loading)
            let promises = Array.from(links).map(processLink);
            await Promise.all(promises);
        });
    </script>
